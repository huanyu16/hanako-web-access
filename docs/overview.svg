  <text x="100" y="170" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">1. Discover</text>
  <text x="100" y="215" fill="#5F6368" font-family="Inter, Arial, sans-serif" font-size="18">Use Hanako native</text>
